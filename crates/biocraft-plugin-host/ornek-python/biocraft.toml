giris  = "eklenti.py"                 # manifest'e göreli Python betiği

[uyumluluk]
abi          = "0.1"                  # hedeflenen ABI sürümü (MK-14)
cekirdek_min = "0.1.0"               # uyumlu en düşük çekirdek sürümü

[yetkiler]
# Bu örnek herhangi bir yetki istemez (en az yetki).
istenen = []
