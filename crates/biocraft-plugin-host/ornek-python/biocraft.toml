# Örnek Python (Tier-3) eklentisi manifest'i (İP-07 — Gün 14).
# Ayrı-süreç (out-of-process) köprü gösterimi için kullanılır (MK-02).

[eklenti]
kimlik = "biocraft.ornek.python"     # biocraft.<yayinci>.<eklenti>
ad     = "Python Örnek Eklentisi"
surum  = "0.1.0"
