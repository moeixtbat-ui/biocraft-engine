# deny.toml — BioCraft Engine bağımlılık politikası
# Referans: docs/specs/Hukuk-ve-Operasyon.md Bölüm 1 (Lisans Stratejisi)
# MK-60: Tüm bağımlılıklar bu politikaya uymak zorunda
# cargo-deny v0.16+ formatı (EmbarkStudios/cargo-deny-action@v2)

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
]

# ─── Güvenlik açıkları (RustSec Advisory DB) ─────────────────────────────────
[advisories]
version = 2
ignore = []

# ─── Lisans politikası ───────────────────────────────────────────────────────
# Hukuk-ve-Operasyon.md §1: AGPLv3 çekirdek + Apache-2.0 SDK.
# Aşağıdaki liste dışındaki her lisans reddedilir.
# Yeni bağımlılık farklı lisans içeriyorsa buraya ekle + avukata danış.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "AGPL-3.0-or-later",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
]

# ─── Yasaklı / tekrarlanan crate'ler ─────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny      = []
skip      = []
skip-tree = []

# ─── Kaynak doğrulama ────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
