# deny.toml — BioCraft Engine bağımlılık politikası
# Referans: docs/specs/Hukuk-ve-Operasyon.md Bölüm 1 (Lisans Stratejisi)
# MK-60: Tüm bağımlılıklar bu politikaya uymak zorunda
# cargo-deny v0.16+ formatı (EmbarkStudios/cargo-deny-action@v2)

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
]

# ─── Güvenlik açıkları (RustSec Advisory DB) ─────────────────────────────────
[advisories]
version = 2
ignore = []

# ─── Lisans politikası ───────────────────────────────────────────────────────
# Hukuk-ve-Operasyon.md §1: AGPLv3 çekirdek + Apache-2.0 SDK.
# Aşağıdaki liste dışındaki her lisans reddedilir.
# Yeni bağımlılık farklı lisans içeriyorsa buraya ekle + avukata danış.
[licenses]
# Allow listesinde olup henüz hiçbir bağımlılıkta görülmeyen lisanslar uyarı üretmesin
# (stub aşaması; bağımlılık eklendikçe bu lisanslar kullanılacak)
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "AGPL-3.0-or-later",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    # SIL Open Font License — egui'nin gömülü varsayılan fontları (epaint_default_fonts).
    # Yeniden dağıtıma izin veren, yaygın ve güvenli açık font lisansı.
    "OFL-1.1",
]

# Crate'e özel lisans muafiyeti.
# epaint_default_fonts, Ubuntu fontunu içerir; bunun lisansı (UFL-1.0) SPDX-dışı bir
# "LicenseRef" olduğundan global listeye konamaz, yalnızca bu crate için muaf tutulur.
# UFL-1.0 da yeniden dağıtıma izin veren açık bir font lisansıdır.
[[licenses.exceptions]]
name = "epaint_default_fonts"
allow = ["OFL-1.1", "LicenseRef-UFL-1.0"]

# libbz2-rs-sys: noodles-cram'in CRAM **harici sıkıştırma** (bzip2 codec) için kullandığı
# SAF-RUST yeniden uygulaması (ÇE-01).  Lisansı "bzip2-1.0.6" = bzip2/libbzip2 lisansı:
# BSD/Zlib benzeri, yeniden dağıtıma + ticari kullanıma izin veren, çok yaygın ve güvenli bir
# açık lisans (geçerli SPDX kimliği).  Global allow listesine KONMAZ; yalnızca bu crate için
# muaf tutulur (en az ayrıcalık, epaint_default_fonts deseni gibi).
# HUKUK NOTU (insan-eli): lisans politikası eklemesi → Hukuk-ve-Operasyon.md §1; bzip2 lisansı
# permissive olduğundan düşük risk, yine de avukat teyidi kayda değer.
[[licenses.exceptions]]
name = "libbz2-rs-sys"
allow = ["bzip2-1.0.6"]

# ─── Yasaklı / tekrarlanan crate'ler ─────────────────────────────────────────
[bans]
multiple-versions = "warn"
# Cargo.toml'da * sürüm joker karakteri → reddet (tekrar üretilebilirlik, MK-60)
wildcards = "deny"
# İç workspace path bağımlılıkları (biocraft-* arası) sürüm taşımaz; bunları wildcard sayma
allow-wildcard-paths = true
deny      = []
skip      = []
skip-tree = []

# ─── Kaynak doğrulama ────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
