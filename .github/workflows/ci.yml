name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Ana CI: Derleme / Test / Format / Lint / Audit ──────────────────────────
  # MK-58: Her push/PR'da otomatik kalite kapısı
  # MK-60: Bağımlılık güvenlik denetimi
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # Bir OS başarısız olsa bile diğeri tamamlanır
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Topoloji scripti için Python 3 (her iki OS'ta tutarlı)
      - name: Python 3 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rust araç zinciri (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Bağımlılık + derleme çıktısı önbelleği
      - name: Cargo önbellek
        uses: Swatinem/rust-cache@v2

      # --- 1. Derleme ---
      - name: cargo build --workspace
        run: cargo build --workspace --locked

      # --- 2. Testler ---
      - name: cargo test --workspace
        run: cargo test --workspace --locked

      # --- 3. Format kontrolü (rustfmt.toml kuralları) ---
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # --- 4. Lint (clippy.toml kuralları, -D warnings = uyarı = hata) ---
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # --- 5. Güvenlik açığı denetimi — MK-60 ---
      - name: cargo audit kur ve çalıştır
        run: |
          cargo install cargo-audit --quiet --locked
          cargo audit

      # --- 6. Kullanılmayan bağımlılık tespiti ---
      - name: cargo machete kur ve çalıştır
        run: |
          cargo install cargo-machete --quiet --locked
          cargo machete

      # --- 7. Katman topolojisi (MK-40: L0→L5 yönü, döngüsel bağımlılık yasak) ---
      - name: Katman topoloji kontrolü
        run: python scripts/check-topology.py

  # ─── Performans regresyon: saf-Rust benchmark + baseline karşılaştırma ───────
  # İP-21 / MK-58: cekirdek_bench oranlarını benchmarks/baseline.json ile karşılaştırır;
  # ciddi (algoritmik) gerileme → build durur.  Tek runner (tutarlı ölçüm); oran-tabanlı
  # olduğu için makineden ~bağımsız.
  bench:
    name: Performans Regresyon (benchmark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rust araç zinciri (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo önbellek
        uses: Swatinem/rust-cache@v2

      # Bench stdout'u saf JSON üretir (stderr = derleme + insan-okur özet, log'da görünür).
      - name: Benchmark çalıştır
        run: cargo bench -p biocraft-types --bench cekirdek_bench --locked > benchmarks/current.json

      - name: Regresyon denetimi
        run: python scripts/check-bench.py benchmarks/current.json benchmarks/baseline.json

  # ─── cargo-deny: Lisans Politikası + Advisory Denetimi ───────────────────────
  # deny.toml → Hukuk-ve-Operasyon.md §1 (AGPLv3 çekirdekle uyumsuz lisanslar reddedilir)
  # MK-60: Bağımlılık güvenliği
  deny:
    name: Lisans & Bağımlılık Denetimi (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
